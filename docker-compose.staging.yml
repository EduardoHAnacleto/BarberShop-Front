# Staging stack: frontend + api + sqlserver + redis.
# No observability services (Prometheus, Grafana, Loki, Tempo) — staging only.
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d
#
# Environment: copy .env.example to .env.staging and fill in the values,
# then: docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

services:

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barbershop-staging-sqlserver
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-BarberShop@2024}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_staging_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "${SA_PASSWORD:-BarberShop@2024}",
          "-Q", "SELECT 1",
          "-C"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── SQL Server Init — seeds the database on first run ────────────────────────
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barbershop-staging-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-BarberShop@2024}"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${SA_PASSWORD:-BarberShop@2024}" -C -l 30 -Q "
          IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'barbershop')
            CREATE DATABASE barbershop;
        "
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${SA_PASSWORD:-BarberShop@2024}" -d barbershop -C -l 30 -i /dev/stdin << 'ENDSQL'
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Services]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[Services] ([ServiceId] INT NOT NULL IDENTITY(1,1), [ServiceName] NVARCHAR(100) NOT NULL, [ServiceDescription] NVARCHAR(500) NOT NULL DEFAULT '', [ServiceDuration] INT NOT NULL, [ServicePrice] DECIMAL(10,2) NOT NULL, [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Services] PRIMARY KEY ([ServiceId]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Customers]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[Customers] ([CustomerId] INT NOT NULL IDENTITY(1,1), [CustomerName] NVARCHAR(100) NOT NULL, [CustomerDateOfBirth] DATETIME2 NULL, [CustomerEmail] NVARCHAR(200) NOT NULL DEFAULT '', [CustomerPhoneNumber] NVARCHAR(20) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Customers] PRIMARY KEY ([CustomerId]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Workers]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[Workers] ([WorkerId] INT NOT NULL IDENTITY(1,1), [WorkerName] NVARCHAR(100) NOT NULL, [WorkerDateOfBirth] DATETIME2 NOT NULL, [WorkerAddress] NVARCHAR(200) NOT NULL DEFAULT '', [WorkerPosition] NVARCHAR(100) NOT NULL DEFAULT '', [WorkerPhoneNumber] NVARCHAR(20) NOT NULL DEFAULT '', [WorkerWagePerHour] DECIMAL(10,2) NOT NULL, [Email] NVARCHAR(200) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Workers] PRIMARY KEY ([WorkerId]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[WorkersService]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[WorkersService] ([ProvidedServicesServiceId] INT NOT NULL, [WorkersWorkerId] INT NOT NULL, CONSTRAINT [PK_WorkersService] PRIMARY KEY ([ProvidedServicesServiceId], [WorkersWorkerId]), CONSTRAINT [FK_WorkersService_Services] FOREIGN KEY ([ProvidedServicesServiceId]) REFERENCES [dbo].[Services] ([ServiceId]), CONSTRAINT [FK_WorkersService_Workers] FOREIGN KEY ([WorkersWorkerId]) REFERENCES [dbo].[Workers] ([WorkerId]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Users]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[Users] ([UserId] INT NOT NULL IDENTITY(1,1), [UserEmail] NVARCHAR(200) NOT NULL, [UserPasswordHash] NVARCHAR(500) NOT NULL DEFAULT '', [UserRole] INT NOT NULL DEFAULT 0, [UserIsActive] BIT NOT NULL DEFAULT 1, [UserCreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [UserFailedLoginAttempts] INT NOT NULL DEFAULT 0, [UserLockoutEnd] DATETIME2 NULL, [UserGoogleId] NVARCHAR(200) NULL, [UserCustomerId] INT NULL, [UserWorkerId] INT NULL, CONSTRAINT [PK_Users] PRIMARY KEY ([UserId]), CONSTRAINT [FK_Users_Customers] FOREIGN KEY ([UserCustomerId]) REFERENCES [dbo].[Customers] ([CustomerId]), CONSTRAINT [FK_Users_Workers] FOREIGN KEY ([UserWorkerId]) REFERENCES [dbo].[Workers] ([WorkerId]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Appointments]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[Appointments] ([AppointmentId] INT NOT NULL IDENTITY(1,1), [AppointmentWorkerId] INT NOT NULL, [AppointmentCustomerId] INT NOT NULL, [AppointmentServiceId] INT NOT NULL, [AppointmentScheduledFor] DATETIME2 NOT NULL, [AppointmentStatus] INT NOT NULL DEFAULT 0, [AppointmentCompletedAt] DATETIME2 NULL, [AppointmentExtraDetails] NVARCHAR(500) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Appointments] PRIMARY KEY ([AppointmentId]), CONSTRAINT [FK_Appointments_Workers] FOREIGN KEY ([AppointmentWorkerId]) REFERENCES [dbo].[Workers] ([WorkerId]), CONSTRAINT [FK_Appointments_Customers] FOREIGN KEY ([AppointmentCustomerId]) REFERENCES [dbo].[Customers] ([CustomerId]), CONSTRAINT [FK_Appointments_Services] FOREIGN KEY ([AppointmentServiceId]) REFERENCES [dbo].[Services] ([ServiceId]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[BusinessSchedules]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[BusinessSchedules] ([Id] INT NOT NULL IDENTITY(1,1), [DayOfWeek] INT NOT NULL, [IsOpen] BIT NOT NULL DEFAULT 0, [OpenTime] TIME NULL, [CloseTime] TIME NULL, [BreakStart] TIME NULL, [BreakEnd] TIME NULL, CONSTRAINT [PK_BusinessSchedules] PRIMARY KEY ([Id]), CONSTRAINT [UQ_BusinessSchedules_DayOfWeek] UNIQUE ([DayOfWeek]));
          END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[WorkingHours]') AND type = 'U')
          BEGIN
            CREATE TABLE [dbo].[WorkingHours] ([Id] INT NOT NULL IDENTITY(1,1), [HolidayClosedFrom] DATETIME2 NOT NULL, [HolidayClosedUntil] DATETIME2 NULL, [HolidayReason] NVARCHAR(200) NOT NULL DEFAULT '', [ClosureType] INT NOT NULL DEFAULT 0, CONSTRAINT [PK_WorkingHours] PRIMARY KEY ([Id]));
          END
          IF NOT EXISTS (SELECT 1 FROM [dbo].[BusinessSchedules])
          BEGIN
            INSERT INTO [dbo].[BusinessSchedules] ([DayOfWeek],[IsOpen],[OpenTime],[CloseTime],[BreakStart],[BreakEnd]) VALUES (0,0,NULL,NULL,NULL,NULL),(1,1,'09:00','18:00','12:00','13:00'),(2,1,'09:00','18:00','12:00','13:00'),(3,1,'09:00','18:00','12:00','13:00'),(4,1,'09:00','18:00','12:00','13:00'),(5,1,'09:00','18:00','12:00','13:00'),(6,1,'10:30','16:00',NULL,NULL);
          END
          IF NOT EXISTS (SELECT 1 FROM [dbo].[Users] WHERE [UserEmail] = 'admin@barbershop.com')
          BEGIN
            INSERT INTO [dbo].[Users] ([UserEmail],[UserPasswordHash],[UserRole],[UserIsActive],[UserCreatedAt],[UserFailedLoginAttempts]) VALUES ('admin@barbershop.com','$2a$$11$$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2uheWG/igi.',3,1,GETUTCDATE(),0);
          END
        ENDSQL
    restart: "no"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: barbershop-staging-redis
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    image: "${API_IMAGE:-eduardohanacleto/barbershop-api:latest}"
    container_name: barbershop-staging-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=barbershop;User Id=sa;Password=${SA_PASSWORD:-BarberShop@2024};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY:-BarberShopSuperSecretKeyForProduction32Chars12}
      - Jwt__Issuer=BarberShop.API
      - Jwt__Audience=BarberShop.Client
      - Jwt__ExpiresInMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: http://api:8080
        NUXT_PUBLIC_GOOGLE_CLIENT_ID: "${NUXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
    container_name: barbershop-staging-frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_staging_data:
  redis_staging_data:
