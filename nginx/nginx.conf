# Nginx reverse proxy for the BarberShop production stack.
# Routes / → frontend (Nuxt), /api → ASP.NET Core API.
# Handles SignalR WebSocket upgrades for all five hubs.

upstream frontend { server frontend:3000; }
upstream api      { server api:8080; }

server {
  listen 80;
  server_name _;

  # Frontend — all non-API, non-hub requests.
  location / {
    proxy_pass http://frontend;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API REST endpoints.
  location /api {
    proxy_pass http://api;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Metrics and health probes (no auth required by the API).
  location /metrics { proxy_pass http://api; }
  location /health  { proxy_pass http://api; }

  # SignalR WebSocket upgrades for all five hubs.
  location ~ ^/(appointmentsHub|workersHub|customersHub|servicesHub|usersHub) {
    proxy_pass         http://api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 86400;
  }
}
