# Production stack: frontend + api + sqlserver + redis + nginx.
# Nginx listens on port 80 and proxies to the frontend (port 3000) and API (port 8080).
#
# Usage:
#   docker compose up -d
#
# Environment: copy .env.example to .env and fill in the values.

services:

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barbershop-sqlserver
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-BarberShop@2024}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "${SA_PASSWORD:-BarberShop@2024}",
          "-Q", "SELECT 1",
          "-C"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── SQL Server Init — seeds the database on first run ────────────────────────
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barbershop-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-BarberShop@2024}"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${SA_PASSWORD:-BarberShop@2024}" -C -l 30 -Q "
          IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'barbershop')
            CREATE DATABASE barbershop;
        "
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${SA_PASSWORD:-BarberShop@2024}" -d barbershop -C -l 30 -Q "
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Services]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[Services] ([ServiceId] INT NOT NULL IDENTITY(1,1), [ServiceName] NVARCHAR(100) NOT NULL, [ServiceDescription] NVARCHAR(500) NOT NULL DEFAULT '', [ServiceDuration] INT NOT NULL, [ServicePrice] DECIMAL(10,2) NOT NULL, [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Services] PRIMARY KEY ([ServiceId])); END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Customers]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[Customers] ([CustomerId] INT NOT NULL IDENTITY(1,1), [CustomerName] NVARCHAR(100) NOT NULL, [CustomerDateOfBirth] DATETIME2 NULL, [CustomerEmail] NVARCHAR(200) NOT NULL DEFAULT '', [CustomerPhoneNumber] NVARCHAR(20) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Customers] PRIMARY KEY ([CustomerId])); END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Workers]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[Workers] ([WorkerId] INT NOT NULL IDENTITY(1,1), [WorkerName] NVARCHAR(100) NOT NULL, [WorkerDateOfBirth] DATETIME2 NOT NULL, [WorkerAddress] NVARCHAR(200) NOT NULL DEFAULT '', [WorkerPosition] NVARCHAR(100) NOT NULL DEFAULT '', [WorkerPhoneNumber] NVARCHAR(20) NOT NULL DEFAULT '', [WorkerWagePerHour] DECIMAL(10,2) NOT NULL, [Email] NVARCHAR(200) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, CONSTRAINT [PK_Workers] PRIMARY KEY ([WorkerId])); END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[WorkersService]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[WorkersService] ([ProvidedServicesId] INT NOT NULL, [WorkerId] INT NOT NULL, CONSTRAINT [PK_WorkersService] PRIMARY KEY ([ProvidedServicesId], [WorkerId]), CONSTRAINT [FK_WorkersService_Services] FOREIGN KEY ([ProvidedServicesId]) REFERENCES [dbo].[Services] ([ServiceId]), CONSTRAINT [FK_WorkersService_Workers] FOREIGN KEY ([WorkerId]) REFERENCES [dbo].[Workers] ([WorkerId])); END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Users]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[Users] ([UserId] INT NOT NULL IDENTITY(1,1), [UserEmail] NVARCHAR(200) NOT NULL, [UserPasswordHash] NVARCHAR(500) NOT NULL DEFAULT '', [UserRole] INT NOT NULL DEFAULT 0, [UserIsActive] BIT NOT NULL DEFAULT 1, [UserCreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [UserFailedLoginAttempts] INT NOT NULL DEFAULT 0, [UserLockoutEnd] DATETIME2 NULL, [UserGoogleId] NVARCHAR(200) NULL, [UserCustomerId] INT NULL, [UserWorkerId] INT NULL, [UserSecurityStamp] NVARCHAR(64) NOT NULL CONSTRAINT [DF_Users_SecurityStamp] DEFAULT (CONVERT(NVARCHAR(64), NEWID())), [UserPasswordResetToken] NVARCHAR(128) NULL, [UserPasswordResetTokenExpiresAt] DATETIME2 NULL, CONSTRAINT [PK_Users] PRIMARY KEY ([UserId]), CONSTRAINT [FK_Users_Customers] FOREIGN KEY ([UserCustomerId]) REFERENCES [dbo].[Customers] ([CustomerId]), CONSTRAINT [FK_Users_Workers] FOREIGN KEY ([UserWorkerId]) REFERENCES [dbo].[Workers] ([WorkerId])); END
          IF COL_LENGTH('dbo.Users', 'UserSecurityStamp') IS NULL
          BEGIN ALTER TABLE [dbo].[Users] ADD [UserSecurityStamp] NVARCHAR(64) NOT NULL CONSTRAINT [DF_Users_SecurityStamp] DEFAULT (CONVERT(NVARCHAR(64), NEWID())); END
          IF COL_LENGTH('dbo.Users', 'UserPasswordResetToken') IS NULL
          BEGIN ALTER TABLE [dbo].[Users] ADD [UserPasswordResetToken] NVARCHAR(128) NULL; END
          IF COL_LENGTH('dbo.Users', 'UserPasswordResetTokenExpiresAt') IS NULL
          BEGIN ALTER TABLE [dbo].[Users] ADD [UserPasswordResetTokenExpiresAt] DATETIME2 NULL; END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Appointments]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[Appointments] ([AppointmentId] INT NOT NULL IDENTITY(1,1), [AppointmentWorkerId] INT NOT NULL, [AppointmentCustomerId] INT NOT NULL, [AppointmentServiceId] INT NOT NULL, [AppointmentScheduledFor] DATETIME2 NOT NULL, [AppointmentStatus] INT NOT NULL DEFAULT 0, [AppointmentCompletedAt] DATETIME2 NULL, [AppointmentExtraDetails] NVARCHAR(500) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), [LastUpdatedAt] DATETIME2 NULL, [AppointmentRecurrenceId] UNIQUEIDENTIFIER NULL, [AppointmentReminder24hSentAt] DATETIME2 NULL, [AppointmentReminder1hSentAt] DATETIME2 NULL, CONSTRAINT [PK_Appointments] PRIMARY KEY ([AppointmentId]), CONSTRAINT [FK_Appointments_Workers] FOREIGN KEY ([AppointmentWorkerId]) REFERENCES [dbo].[Workers] ([WorkerId]), CONSTRAINT [FK_Appointments_Customers] FOREIGN KEY ([AppointmentCustomerId]) REFERENCES [dbo].[Customers] ([CustomerId]), CONSTRAINT [FK_Appointments_Services] FOREIGN KEY ([AppointmentServiceId]) REFERENCES [dbo].[Services] ([ServiceId])); END
          IF COL_LENGTH('dbo.Appointments', 'AppointmentRecurrenceId') IS NULL
          BEGIN ALTER TABLE [dbo].[Appointments] ADD [AppointmentRecurrenceId] UNIQUEIDENTIFIER NULL; END
          IF COL_LENGTH('dbo.Appointments', 'AppointmentReminder24hSentAt') IS NULL
          BEGIN ALTER TABLE [dbo].[Appointments] ADD [AppointmentReminder24hSentAt] DATETIME2 NULL; END
          IF COL_LENGTH('dbo.Appointments', 'AppointmentReminder1hSentAt') IS NULL
          BEGIN ALTER TABLE [dbo].[Appointments] ADD [AppointmentReminder1hSentAt] DATETIME2 NULL; END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[Reviews]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[Reviews] ([ReviewId] INT NOT NULL IDENTITY(1,1), [ReviewAppointmentId] INT NOT NULL, [ReviewCustomerId] INT NOT NULL, [ReviewWorkerId] INT NOT NULL, [ReviewRating] INT NOT NULL, [ReviewComment] NVARCHAR(1000) NOT NULL DEFAULT '', [CreatedAt] DATETIME2 NOT NULL DEFAULT GETUTCDATE(), CONSTRAINT [PK_Reviews] PRIMARY KEY ([ReviewId]), CONSTRAINT [FK_Reviews_Appointments] FOREIGN KEY ([ReviewAppointmentId]) REFERENCES [dbo].[Appointments] ([AppointmentId]) ON DELETE CASCADE, CONSTRAINT [FK_Reviews_Customers] FOREIGN KEY ([ReviewCustomerId]) REFERENCES [dbo].[Customers] ([CustomerId]), CONSTRAINT [FK_Reviews_Workers] FOREIGN KEY ([ReviewWorkerId]) REFERENCES [dbo].[Workers] ([WorkerId]), CONSTRAINT [UQ_Reviews_AppointmentId] UNIQUE ([ReviewAppointmentId])); END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[BusinessSchedules]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[BusinessSchedules] ([Id] INT NOT NULL IDENTITY(1,1), [DayOfWeek] INT NOT NULL, [IsOpen] BIT NOT NULL DEFAULT 0, [OpenTime] TIME NULL, [CloseTime] TIME NULL, [BreakStart] TIME NULL, [BreakEnd] TIME NULL, CONSTRAINT [PK_BusinessSchedules] PRIMARY KEY ([Id]), CONSTRAINT [UQ_BusinessSchedules_DayOfWeek] UNIQUE ([DayOfWeek])); END
          IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[WorkingHours]') AND type = 'U')
          BEGIN CREATE TABLE [dbo].[WorkingHours] ([Id] INT NOT NULL IDENTITY(1,1), [HolidayClosedFrom] DATETIME2 NOT NULL, [HolidayClosedUntil] DATETIME2 NULL, [HolidayReason] NVARCHAR(200) NOT NULL DEFAULT '', [ClosureType] INT NOT NULL DEFAULT 0, CONSTRAINT [PK_WorkingHours] PRIMARY KEY ([Id])); END
          IF NOT EXISTS (SELECT 1 FROM [dbo].[BusinessSchedules])
          BEGIN INSERT INTO [dbo].[BusinessSchedules] ([DayOfWeek],[IsOpen],[OpenTime],[CloseTime],[BreakStart],[BreakEnd]) VALUES (0,0,NULL,NULL,NULL,NULL),(1,1,'09:00','18:00','12:00','13:00'),(2,1,'09:00','18:00','12:00','13:00'),(3,1,'09:00','18:00','12:00','13:00'),(4,1,'09:00','18:00','12:00','13:00'),(5,1,'09:00','18:00','12:00','13:00'),(6,1,'10:30','16:00',NULL,NULL); END
          IF NOT EXISTS (SELECT 1 FROM [dbo].[Users] WHERE [UserEmail] = 'admin@barbershop.com')
          BEGIN INSERT INTO [dbo].[Users] ([UserEmail],[UserPasswordHash],[UserRole],[UserIsActive],[UserCreatedAt],[UserFailedLoginAttempts]) VALUES ('admin@barbershop.com','\$2a\$\$11\$\$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2uheWG/igi.',3,1,GETUTCDATE(),0); END
        "
    restart: "no"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: barbershop-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    image: "${API_IMAGE:-eduardohanacleto/barbershop-full:1.0.0}"
    container_name: barbershop-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=barbershop;User Id=sa;Password=${SA_PASSWORD:-BarberShop@2024};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY:-BarberShopSuperSecretKeyForProduction32Chars12}
      - Jwt__Issuer=BarberShop.API
      - Jwt__Audience=BarberShop.Client
      - Jwt__ExpiresInMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    healthcheck:
      # ASP.NET image has no curl/wget — use bash TCP check on port 8080.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: https://${DOMAIN:-localhost}
        NUXT_PUBLIC_GOOGLE_CLIENT_ID: "${NUXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
        NUXT_PUBLIC_SHOP_ADDRESS: "${NUXT_PUBLIC_SHOP_ADDRESS:-1 Sky City, Victoria St W, Auckland CBD 1010, New Zealand}"
        NUXT_PUBLIC_SHOP_PHONE: "${NUXT_PUBLIC_SHOP_PHONE:-+64 9 000 0000}"
        NUXT_PUBLIC_SHOP_EMAIL: "${NUXT_PUBLIC_SHOP_EMAIL:-info@barbershop.com}"
        NUXT_PUBLIC_SHOP_LAT: "${NUXT_PUBLIC_SHOP_LAT:--36.8682}"
        NUXT_PUBLIC_SHOP_LNG: "${NUXT_PUBLIC_SHOP_LNG:-174.7620}"
        NUXT_PUBLIC_GOOGLE_MAPS_API_KEY: "${NUXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}"
    container_name: barbershop-frontend
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: barbershop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  sqlserver_data:
  redis_data:
